<nav class="pagination" aria-label="Pagination">
  {% if pagination.prev_url %}
    <a rel="prev" href="{{ pagination.prev_url }}" aria-label="Previous page">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
  {% else %}
    <span class="disabled" aria-hidden="true">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </span>
  {% endif %}

  {% for p in pagination.pages %}
    {% if p.n == pagination.current %}
      <span class="current" aria-current="page">{{ p.n }}</span>
    {% else %}
      <a href="{{ p.url }}">{{ p.n }}</a>
    {% endif %}
  {% endfor %}

  {% if pagination.next_url %}
    <a rel="next" href="{{ pagination.next_url }}" aria-label="Next page">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  {% else %}
    <span class="disabled" aria-hidden="true">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </span>
  {% endif %}
</nav>
